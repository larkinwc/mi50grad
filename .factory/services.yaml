commands:
  install: "echo 'No package install needed - HIP/ROCm on dev server'"
  build_kernel: "ssh root@192.168.1.198 'docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -v /opt/mi50grad:/opt/mi50grad mi50grad bash -c \"cd /opt/mi50grad && make kernels\"'"
  test: "ssh root@192.168.1.198 'docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -e HIP_VISIBLE_DEVICES=0,1,2,3 -v /opt/mi50grad:/opt/mi50grad -v /opt/models:/opt/models mi50grad bash -c \"cd /opt/mi50grad && python3 tests/bench_current_state.py\"'"
  deploy: "rsync -avz --delete --exclude='.git' --exclude='build/' --exclude='__pycache__' --exclude='notes/' --exclude='plans/' --exclude='.factory' /Users/larkinwc/personal/ml/mi50grad/ root@192.168.1.198:/opt/mi50grad/"

services:
  vllm:
    start: "ssh root@192.168.1.198 'docker start vllm-mobydick'"
    stop: "ssh root@192.168.1.198 'docker stop vllm-mobydick'"
    healthcheck: "ssh root@192.168.1.198 'docker ps | grep vllm-mobydick'"
    port: 8000
    depends_on: []
