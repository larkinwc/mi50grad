commands:
  deploy: "rsync -avz --delete --exclude='.git' --exclude='build/' --exclude='__pycache__' --exclude='notes/' --exclude='plans/' --exclude='.factory' /Users/larkinwc/personal/ml/mi50grad/ root@192.168.1.198:/opt/mi50grad/"
  docker_build: "ssh root@192.168.1.198 'cd /opt/mi50grad && docker build -t mi50grad . 2>&1 | tail -5'"
  build_hip: "ssh root@192.168.1.198 \"docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -v /opt/mi50grad:/opt/mi50grad mi50grad bash -c 'cd /opt/mi50grad && mkdir -p build/kernels && /opt/rocm/bin/hipcc -O3 --offload-arch=gfx906 -std=c++17 -shared -fPIC'\""
  build_all: "ssh root@192.168.1.198 \"docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -v /opt/mi50grad:/opt/mi50grad mi50grad bash -c 'cd /opt/mi50grad && export ROCM_PATH=/opt/rocm && make kernels 2>&1; mkdir -p build/kernels; for f in src/kernels/*.hip; do echo Building \\$f && /opt/rocm/bin/hipcc -O3 --offload-arch=gfx906 -std=c++17 -shared -fPIC -o build/kernels/\\$(basename \\$f .hip).so \\$f 2>&1; done'\""
  build_c: "ssh root@192.168.1.198 \"docker run --rm -v /opt/mi50grad:/opt/mi50grad mi50grad bash -c 'cd /opt/mi50grad && gcc -O3 -mf16c -mavx -shared -fPIC -o src/runtime/fast_allreduce.so src/runtime/fast_allreduce.c'\""
  build_c_dispatch: "ssh root@192.168.1.198 \"docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -v /opt/mi50grad:/opt/mi50grad mi50grad bash -c 'cd /opt/mi50grad && gcc -O3 -shared -fPIC -I/opt/rocm/include -L/opt/rocm/lib -lamdhip64 -o src/runtime/c_dispatch.so src/runtime/c_dispatch.c'\""
  test: "ssh root@192.168.1.198 \"docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -v /opt/mi50grad:/opt/mi50grad -v /opt/models:/opt/models mi50grad bash -c 'cd /opt/mi50grad && python3'\""
  test_tp4: "ssh root@192.168.1.198 \"docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video -e HIP_VISIBLE_DEVICES=0,1,2,3 -v /opt/mi50grad:/opt/mi50grad -v /opt/models:/opt/models mi50grad bash -c 'cd /opt/mi50grad && python3'\""
  stop_vllm: "ssh root@192.168.1.198 'docker stop vllm-mobydick 2>/dev/null || true'"
  start_vllm: "ssh root@192.168.1.198 'docker start vllm-mobydick 2>/dev/null || true'"
  remote_shell: "ssh root@192.168.1.198"

services: {}
